name: Push Images on Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: write

# Only one run at a time per branch. If a new push arrives while a previous
# run is still in progress, cancel the older run so the newest commit always
# wins the "latest" tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-fedora:
    name: Build and push Fedora image
    uses: ./.github/workflows/build-image.yml
    with:
      push: true
      registry: ghcr.io/confidential-devhub/staged-images
      image_name: coco-tools
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-ubi:
    name: Build and push UBI image
    uses: ./.github/workflows/build-ubi-image.yml
    with:
      push: true
    secrets:
      ORG_ID: ${{ secrets.ORG_ID }}
      ACTIVATION_KEY: ${{ secrets.ACTIVATION_KEY }}
      QUAY_USER: ${{ secrets.QUAY_USER }}
      QUAY_SECRET: ${{ secrets.QUAY_SECRET }}
