name: Check CoCo Release

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 08:00 UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if the image tag already exists'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  check:
    name: Check for new CoCo release
    runs-on: ubuntu-24.04
    outputs:
      coco_tag: ${{ steps.release.outputs.tag }}
      needs_build: ${{ steps.check.outputs.needs_build }}
      coco_rust_version: ${{ steps.rust.outputs.version }}
    steps:
      - name: Get latest CoCo release tag
        id: release
        run: |
          TAG=$(gh api repos/confidential-containers/confidential-containers/releases/latest \
            --jq '.tag_name')
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Unexpected tag format: ${TAG}" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest CoCo release: $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if image tag already exists in GHCR
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          COCO_TAG: ${{ steps.release.outputs.tag }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
        run: |
          FOUND=$(gh api \
            "/orgs/confidential-devhub/packages/container/staged-images%2Fcoco-tools/versions" \
            --jq --arg t "${COCO_TAG}" \
            '[.[].metadata.container.tags // [] | .[] | select(. == $t)] | length > 0' \
            2>/dev/null || echo "false")
          if [[ "$FOUND" == "true" && "${FORCE_REBUILD}" != "true" ]]; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Image tag ${COCO_TAG} already exists — skipping build."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Image tag ${COCO_TAG} not found — triggering build."
          fi

      - name: Get COCO_RUST_VERSION from guest-components rust-toolchain.toml
        id: rust
        env:
          GH_TOKEN: ${{ github.token }}
          COCO_TAG: ${{ steps.release.outputs.tag }}
        run: |
          VERSION=$(gh api \
            "repos/confidential-containers/guest-components/contents/rust-toolchain.toml?ref=${COCO_TAG}" \
            --jq '.content' | base64 -d | grep 'channel' | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "guest-components Rust version at ${COCO_TAG}: ${VERSION}"

  build:
    name: Build and push release image
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    uses: ./.github/workflows/build-image.yml
    with:
      push: true
      registry: ghcr.io/confidential-devhub/staged-images
      image_name: coco-tools
      version_tag: ${{ needs.check.outputs.coco_tag }}
      build_args: COCO_RUST_VERSION=${{ needs.check.outputs.coco_rust_version }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    needs: [check, build]
    if: needs.check.outputs.needs_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          COCO_TAG: ${{ needs.check.outputs.coco_tag }}
        run: |
          IMAGE="ghcr.io/confidential-devhub/staged-images/coco-tools:${COCO_TAG}"
          COCO_URL="https://github.com/confidential-containers/confidential-containers/releases/tag/${COCO_TAG}"
          NOTES=$(printf 'coco-tools container image built for CoCo release [%s](%s).\n\n```\ndocker pull %s\n```' \
            "${COCO_TAG}" "${COCO_URL}" "${IMAGE}")
          gh release create "${COCO_TAG}" \
            --title "coco-tools ${COCO_TAG}" \
            --notes "${NOTES}"
