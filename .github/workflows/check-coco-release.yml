name: Check CoCo Release

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 08:00 UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if the image tag already exists'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  check:
    name: Check for new CoCo release
    runs-on: ubuntu-24.04
    outputs:
      coco_tag: ${{ steps.release.outputs.tag }}
      needs_build: ${{ steps.check.outputs.needs_build }}
    steps:
      - name: Get latest CoCo release tag
        id: release
        run: |
          TAG=$(gh api repos/confidential-containers/confidential-containers/releases/latest \
            --jq '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest CoCo release: $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if image tag already exists in GHCR
        id: check
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          FOUND=$(gh api \
            "/orgs/confidential-devhub/packages/container/staged-images%2Fcoco-tools/versions" \
            --jq --arg t "$TAG" \
            '[.[].metadata.container.tags // [] | .[] | select(. == $t)] | length > 0' \
            2>/dev/null || echo "false")
          if [[ "$FOUND" == "true" && "${{ inputs.force_rebuild }}" != "true" ]]; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "Image tag $TAG already exists — skipping build."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "Image tag $TAG not found — triggering build."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    name: Build and push release image
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    uses: ./.github/workflows/build-image.yml
    with:
      push: true
      registry: ghcr.io/confidential-devhub/staged-images
      image_name: coco-tools
      version_tag: ${{ needs.check.outputs.coco_tag }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    needs: [check, build]
    if: needs.check.outputs.needs_build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Create GitHub release
        run: |
          TAG="${{ needs.check.outputs.coco_tag }}"
          IMAGE="ghcr.io/confidential-devhub/staged-images/coco-tools:${TAG}"
          COCO_URL="https://github.com/confidential-containers/confidential-containers/releases/tag/${TAG}"
          gh release create "$TAG" \
            --title "coco-tools ${TAG}" \
            --notes "coco-tools container image built for CoCo release [${TAG}](${COCO_URL}).

\`\`\`
docker pull ${IMAGE}
\`\`\`"
        env:
          GH_TOKEN: ${{ github.token }}
