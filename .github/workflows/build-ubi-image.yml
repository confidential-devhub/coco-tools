name: Build UBI Container Image

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry after build'
        required: false
        default: false
        type: boolean
      version_tag:
        description: 'Additional version tag to apply (e.g. 0.4.0)'
        required: false
        default: ''
        type: string
    secrets:
      ORG_ID:
        required: true
      ACTIVATION_KEY:
        required: true
      QUAY_USER:
        required: false
      QUAY_SECRET:
        required: false

jobs:
  build:
    name: Build UBI image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to Quay.io
        if: ${{ inputs.push }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_SECRET }}

      - name: Compute image tags
        if: ${{ inputs.push }}
        id: tags
        env:
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          IMAGE="quay.io/openshift_sandboxed_containers/coco-tools"
          TAGS="${IMAGE}:${{ github.sha }}"
          TAGS+=$'\n'"${IMAGE}:latest"
          if [ -n "${INPUT_VERSION_TAG}" ]; then
            TAGS+=$'\n'"${IMAGE}:${INPUT_VERSION_TAG}"
          fi
          { echo "list<<EOF"; echo "$TAGS"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Build image
        if: ${{ !inputs.push }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: Containerfile.ubi
          secrets: |
            org=${{ secrets.ORG_ID }}
            key=${{ secrets.ACTIVATION_KEY }}
          cache-from: type=gha,scope=ubi
          # cache-to intentionally omitted: PR builds must not write to the
          # shared cache used by push/release builds (cache poisoning risk)

      - name: Build and push
        if: ${{ inputs.push }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: Containerfile.ubi
          push: true
          tags: ${{ steps.tags.outputs.list }}
          secrets: |
            org=${{ secrets.ORG_ID }}
            key=${{ secrets.ACTIVATION_KEY }}
          cache-from: type=gha,scope=ubi
          cache-to: type=gha,mode=max,scope=ubi
