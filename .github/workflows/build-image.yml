name: Build Container Image

on:
  workflow_call:
    inputs:
      push:
        description: 'Push image to registry after build'
        required: false
        default: false
        type: boolean
      registry:
        description: 'Container registry path'
        required: false
        default: 'ghcr.io/confidential-devhub/staged-images'
        type: string
      image_name:
        description: 'Image name'
        required: false
        default: 'coco-tools'
        type: string
      version_tag:
        description: 'Additional version tag to apply (e.g. v0.18.0)'
        required: false
        default: ''
        type: string
    secrets:
      GHCR_TOKEN:
        required: false

jobs:
  build:
    name: Build image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute image tags
        if: ${{ inputs.push }}
        id: tags
        run: |
          TAGS="${{ inputs.registry }}/${{ inputs.image_name }}:${{ github.sha }}"
          TAGS+=$'\n'"${{ inputs.registry }}/${{ inputs.image_name }}:latest"
          if [ -n "${{ inputs.version_tag }}" ]; then
            TAGS+=$'\n'"${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.version_tag }}"
          fi
          { echo "list<<EOF"; echo "$TAGS"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Build (PR verification — no push)
        if: ${{ !inputs.push }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: Containerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push
        if: ${{ inputs.push }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
